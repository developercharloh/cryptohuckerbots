components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required: [status]

    ErrorResponse:
      type: object
      properties:
        error:
          type: string
      required: [error]

    SuccessResponse:
      type: object
      properties:
        message:
          type: string
      required: [message]

    # Trade
    TradeSignal:
      type: object
      properties:
        id:
          type: string
        pair:
          type: string
        direction:
          type: string
        market:
          type: string
        confidence:
          type: number
        timeframe:
          type: string
        suggestedTp:
          type: number
        suggestedSl:
          type: number
      required: [id, pair, direction, market, confidence, timeframe, suggestedTp, suggestedSl]

    ExecuteTradeInput:
      type: object
      properties:
        signalId:
          type: string
        botId:
          type: integer
        targetProfit:
          type: number
        stopLoss:
          type: number
        stake:
          type: number
      required: [signalId, botId, targetProfit, stopLoss, stake]

    TradeResult:
      type: object
      properties:
        outcome:
          type: string
        pair:
          type: string
        direction:
          type: string
        botName:
          type: string
        amount:
          type: number
        stake:
          type: number
        availableBalance:
          type: number
        message:
          type: string
      required: [outcome, pair, direction, botName, amount, stake, availableBalance, message]

    TradePosition:
      type: object
      properties:
        id:
          type: integer
        signalId:
          type: string
        pair:
          type: string
        direction:
          type: string
        market:
          type: string
        botId:
          type: integer
        botName:
          type: string
        stake:
          type: number
        targetProfit:
          type: number
        stopLoss:
          type: number
        status:
          type: string
        pnl:
          type: number
        openedAt:
          type: string
        closedAt:
          type: ["string", "null"]
        elapsedMs:
          type: integer
      required: [id, signalId, pair, direction, market, botId, botName, stake, targetProfit, stopLoss, status, pnl, openedAt, closedAt, elapsedMs]

    # Auth
    RegisterInput:
      type: object
      properties:
        fullName:
          type: string
        email:
          type: string
        password:
          type: string
        referralCode:
          type: ["string", "null"]
      required: [fullName, email, password]

    LoginInput:
      type: object
      properties:
        email:
          type: string
        password:
          type: string
      required: [email, password]

    ForgotPasswordInput:
      type: object
      properties:
        email:
          type: string
      required: [email]

    ResetPasswordInput:
      type: object
      properties:
        token:
          type: string
        password:
          type: string
      required: [token, password]

    AuthResponse:
      type: object
      properties:
        token:
          type: string
        user:
          $ref: "#/components/schemas/User"
      required: [token, user]

    User:
      type: object
      properties:
        id:
          type: integer
        fullName:
          type: string
        email:
          type: string
        avatarUrl:
          type: ["string", "null"]
        kycStatus:
          type: string
        createdAt:
          type: string
      required: [id, fullName, email, kycStatus, createdAt]

    # Dashboard
    DashboardSummary:
      type: object
      properties:
        totalBalance:
          type: number
        availableBalance:
          type: number
        todayProfit:
          type: number
        todayProfitPercent:
          type: number
        totalEarnings:
          type: number
        totalProfit:
          type: number
        earningsChangePercent:
          type: number
        activeBots:
          type: integer
        totalBots:
          type: integer
        winRate:
          type: number
        roi:
          type: number
        totalTrades:
          type: integer
      required: [totalBalance, availableBalance, todayProfit, todayProfitPercent, totalEarnings, totalProfit, earningsChangePercent, activeBots, totalBots, winRate, roi, totalTrades]

    ChartPoint:
      type: object
      properties:
        date:
          type: string
        label:
          type: string
        profit:
          type: number
        cumulative:
          type: number
      required: [date, label, profit, cumulative]

    BotProfitItem:
      type: object
      properties:
        botId:
          type: integer
        botName:
          type: string
        profit:
          type: number
        percentage:
          type: number
        color:
          type: string
      required: [botId, botName, profit, percentage, color]

    ActivityItem:
      type: object
      properties:
        id:
          type: integer
        type:
          type: string
        description:
          type: string
        amount:
          type: number
        status:
          type: string
        createdAt:
          type: string
      required: [id, type, description, amount, status, createdAt]

    # Bots
    Bot:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        status:
          type: string
        profitToday:
          type: number
        winRate:
          type: number
        totalTrades:
          type: integer
        iconUrl:
          type: ["string", "null"]
        category:
          type: string
      required: [id, name, status, profitToday, winRate, totalTrades, category]

    BotDetail:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        status:
          type: string
        profitToday:
          type: number
        profitTotal:
          type: number
        winRate:
          type: number
        totalTrades:
          type: integer
        iconUrl:
          type: ["string", "null"]
        category:
          type: string
        description:
          type: string
        performance:
          type: number
      required: [id, name, status, profitToday, profitTotal, winRate, totalTrades, category, description, performance]

    MarketplaceBot:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        price:
          type: number
        winRate:
          type: number
        category:
          type: string
        riskLevel:
          type: string
        description:
          type: string
        iconUrl:
          type: ["string", "null"]
        isPurchased:
          type: boolean
      required: [id, name, price, winRate, category, riskLevel, description, isPurchased]

    # Cashier
    DepositInput:
      type: object
      properties:
        amount:
          type: number
        paymentMethod:
          type: string
        walletAddress:
          type: ["string", "null"]
      required: [amount, paymentMethod]

    WithdrawInput:
      type: object
      properties:
        amount:
          type: number
        paymentMethod:
          type: string
        walletAddress:
          type: string
      required: [amount, paymentMethod, walletAddress]

    Transaction:
      type: object
      properties:
        id:
          type: integer
        type:
          type: string
        amount:
          type: number
        status:
          type: string
        paymentMethod:
          type: string
        createdAt:
          type: string
        walletAddress:
          type: ["string", "null"]
      required: [id, type, amount, status, paymentMethod, createdAt]

    PaymentMethod:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        icon:
          type: string
        type:
          type: string
        network:
          type: ["string", "null"]
        depositAddress:
          type: ["string", "null"]
      required: [id, name, icon, type]

    # Team
    ReferralInfo:
      type: object
      properties:
        referralCode:
          type: string
        referralLink:
          type: string
        totalReferrals:
          type: integer
        totalEarnings:
          type: number
      required: [referralCode, referralLink, totalReferrals, totalEarnings]

    TeamMember:
      type: object
      properties:
        id:
          type: integer
        fullName:
          type: string
        email:
          type: string
        joinedAt:
          type: string
        earnings:
          type: number
        status:
          type: string
      required: [id, fullName, email, joinedAt, earnings, status]

    TeamEarnings:
      type: object
      properties:
        period:
          type: string
        totalEarnings:
          type: number
        chart:
          type: array
          items:
            $ref: "#/components/schemas/ChartPoint"
      required: [period, totalEarnings, chart]

    # Profile
    Profile:
      type: object
      properties:
        id:
          type: integer
        accountUid:
          type: string
        fullName:
          type: string
        email:
          type: string
        phone:
          type: ["string", "null"]
        country:
          type: ["string", "null"]
        avatarUrl:
          type: ["string", "null"]
        kycStatus:
          type: string
        twoFAEnabled:
          type: boolean
        createdAt:
          type: string
      required: [id, accountUid, fullName, email, kycStatus, twoFAEnabled, createdAt]

    ProfileUpdate:
      type: object
      properties:
        fullName:
          type: string
        phone:
          type: string
        country:
          type: string

    ChangePasswordInput:
      type: object
      properties:
        currentPassword:
          type: string
        newPassword:
          type: string
      required: [currentPassword, newPassword]

    TwoFAStatus:
      type: object
      properties:
        enabled:
          type: boolean
        qrCode:
          type: ["string", "null"]
      required: [enabled]

    TwoFAToggleInput:
      type: object
      properties:
        enable:
          type: boolean
        code:
          type: ["string", "null"]
      required: [enable]

    KYCStatus:
      type: object
      properties:
        status:
          type: string
        submittedAt:
          type: ["string", "null"]
        reviewedAt:
          type: ["string", "null"]
        rejectionReason:
          type: ["string", "null"]
      required: [status]

    KYCSessionInput:
      type: object
      properties:
        firstName: { type: string }
        lastName: { type: string }
        country: { type: string }
        documentType: { type: string }
      required: [firstName, lastName, country, documentType]

    KYCSession:
      type: object
      properties:
        url: { type: string }
        sessionId: { type: string }
      required: [url, sessionId]

    KYCInput:
      type: object
      properties:
        documentType:
          type: string
        documentFrontUrl:
          type: string
        selfieUrl:
          type: string
        proofOfAddressUrl:
          type: ["string", "null"]
      required: [documentType, documentFrontUrl, selfieUrl]

    NotificationSettings:
      type: object
      properties:
        emailNotifications:
          type: boolean
        botAlerts:
          type: boolean
        depositWithdrawal:
          type: boolean
        promotions:
          type: boolean
      required: [emailNotifications, botAlerts, depositWithdrawal, promotions]

    NotificationSettingsUpdate:
      type: object
      properties:
        emailNotifications:
          type: boolean
        botAlerts:
          type: boolean
        depositWithdrawal:
          type: boolean
        promotions:
          type: boolean

    Session:
      type: object
      properties:
        id:
          type: integer
        device:
          type: string
        ip:
          type: string
        location:
          type: ["string", "null"]
        lastActive:
          type: string
        isCurrent:
          type: boolean
      required: [id, device, ip, lastActive, isCurrent]

    # Notifications
    Notification:
      type: object
      properties:
        id:
          type: integer
        type:
          type: string
        title:
          type: string
        message:
          type: string
        isRead:
          type: boolean
        createdAt:
          type: string
      required: [id, type, title, message, isRead, createdAt]

    # Support
    SupportTicket:
      type: object
      properties:
        id:
          type: integer
        subject:
          type: string
        message:
          type: string
        status:
          type: string
        createdAt:
          type: string
        updatedAt:
          type: string
      required: [id, subject, message, status, createdAt, updatedAt]

    SupportTicketInput:
      type: object
      properties:
        subject:
          type: string
        message:
          type: string
        category:
          type: string
      required: [subject, message, category]

    FAQItem:
      type: object
      properties:
        id:
          type: integer
        question:
          type: string
        answer:
          type: string
        category:
          type: string
      required: [id, question, answer, category]

    # Admin
    AdminChartPoint:
      type: object
