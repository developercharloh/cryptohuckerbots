        totalUsers: { type: integer }
        activeUsers: { type: integer }
        suspendedUsers: { type: integer }
        newUsersToday: { type: integer }
        totalBots: { type: integer }
        activeBotInstances: { type: integer }
        totalDeposits: { type: number }
        totalWithdrawals: { type: number }
        netRevenue: { type: number }
        pendingDeposits: { type: integer }
        pendingWithdrawals: { type: integer }
        pendingKyc: { type: integer }
        openTickets: { type: integer }
        revenueSeries:
