    AdminUser:
      type: object
      properties:
        id: { type: integer }
        accountUid: { type: string }
        fullName: { type: string }
        email: { type: string }
        status: { type: string }
        kycStatus: { type: string }
        balance: { type: number }
        totalBots: { type: integer }
        avatarUrl: { type: ["string", "null"] }
        country: { type: ["string", "null"] }
