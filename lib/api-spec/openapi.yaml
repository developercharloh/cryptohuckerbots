openapi: 3.1.0
info:
  title: Api
  version: 0.1.0
  description: Quantum FX Bot API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
  - name: auth
  - name: dashboard
  - name: bots
  - name: cashier
  - name: trade
  - name: team
  - name: profile
  - name: notifications
  - name: support
  - name: admin

paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  # Auth
  /auth/register:
    post:
      operationId: register
      tags: [auth]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RegisterInput"
      responses:
        "201":
          description: Registered
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"
        "400":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /auth/login:
    post:
      operationId: login
      tags: [auth]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginInput"
      responses:
        "200":
          description: Logged in
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"
        "401":
          description: Invalid credentials
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /auth/logout:
    post:
      operationId: logout
      tags: [auth]
      responses:
        "200":
          description: Logged out
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"

  /auth/forgot-password:
    post:
      operationId: forgotPassword
      tags: [auth]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ForgotPasswordInput"
      responses:
        "200":
          description: Reset link sent
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"

  /auth/reset-password:
    post:
      operationId: resetPassword
      tags: [auth]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ResetPasswordInput"
      responses:
        "200":
          description: Password reset
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"

  /auth/me:
    get:
      operationId: getMe
      tags: [auth]
      responses:
        "200":
          description: Current user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  # Dashboard
  /dashboard/summary:
    get:
      operationId: getDashboardSummary
      tags: [dashboard]
      responses:
        "200":
          description: Dashboard summary stats
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DashboardSummary"

  /dashboard/earnings-chart:
    get:
      operationId: getEarningsChart
      tags: [dashboard]
      parameters:
        - name: period
          in: query
          schema:
            type: string
      responses:
        "200":
          description: Earnings chart data
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ChartPoint"

  /dashboard/profit-by-bot:
    get:
      operationId: getProfitByBot
      tags: [dashboard]
      responses:
        "200":
          description: Profit breakdown by bot
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/BotProfitItem"

  /dashboard/recent-activity:
    get:
      operationId: getRecentActivity
      tags: [dashboard]
      responses:
        "200":
          description: Recent activity
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ActivityItem"

  # Bots
  /bots:
    get:
      operationId: listBots
      tags: [bots]
      responses:
        "200":
          description: User bots
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Bot"

  /bots/{id}:
    get:
      operationId: getBot
      tags: [bots]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Bot details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BotDetail"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /bots/{id}/toggle:
    post:
      operationId: toggleBot
      tags: [bots]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Bot status toggled
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Bot"

  /bots/{id}/analytics/{period}:
    get:
      operationId: getBotAnalytics
      tags: [bots]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
        - name: period
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Bot analytics chart data
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ChartPoint"

  /marketplace/bots:
    get:
      operationId: listMarketplaceBots
      tags: [bots]
      parameters:
        - name: category
          in: query
          schema:
            type: string
      responses:
        "200":
          description: Marketplace bots
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/MarketplaceBot"

  /marketplace/bots/{id}/purchase:
    post:
      operationId: purchaseBot
      tags: [bots]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Bot purchased
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"
        "400":
          description: Error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  # Cashier
  /cashier/deposit:
    post:
      operationId: createDeposit
      tags: [cashier]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/DepositInput"
      responses:
        "201":
          description: Deposit initiated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Transaction"
        "400":
          description: Error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /cashier/deposit/session:
    post:
      operationId: createDepositSession
      tags: [cashier]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateDepositSessionInput"
      responses:
        "201":
          description: Deposit session created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DepositSession"

  /cashier/deposit/session/{id}:
    get:
      operationId: getDepositSession
      tags: [cashier]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Deposit session
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DepositSession"

  /cashier/deposit/session/{id}/txid:
    post:
      operationId: submitDepositTxid
      tags: [cashier]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SubmitTxidInput"
      responses:
        "200":
          description: TXID submitted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DepositSession"

  /admin/deposit-sessions:
    get:
      operationId: adminListDepositSessions
      tags: [admin]
      parameters:
        - name: status
          in: query
          schema:
            type: string
      responses:
        "200":
          description: Deposit sessions
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/AdminDepositSession"

  /admin/deposit-sessions/{id}/review:
    post:
      operationId: adminReviewDepositSession
      tags: [admin]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AdminReviewDepositInput"
      responses:
        "200":
          description: Updated deposit session
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminDepositSession"

  /cashier/withdraw:
    post:
      operationId: createWithdrawal
      tags: [cashier]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/WithdrawInput"
      responses:
        "201":
          description: Withdrawal initiated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Transaction"
        "400":
          description: Error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /cashier/transactions:
    get:
      operationId: listTransactions
      tags: [cashier]
      parameters:
        - name: type
          in: query
          schema:
            type: string
            enum: [all, deposit, withdrawal]
      responses:
        "200":
          description: Transaction list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Transaction"

  /cashier/payment-methods:
    get:
      operationId: listPaymentMethods
      tags: [cashier]
      responses:
        "200":
          description: Payment methods
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/PaymentMethod"

  # Trade
  /trade/signals:
    get:
      operationId: listTradeSignals
      tags: [trade]
      responses:
        "200":
          description: AI trading signals
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/TradeSignal"

  /trade/execute:
    post:
      operationId: executeTrade
      tags: [trade]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ExecuteTradeInput"
      responses:
        "200":
          description: Opened trade position
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TradePosition"
        "400":
          description: Error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /trade/positions:
    get:
      operationId: listTradePositions
      tags: [trade]
      responses:
        "200":
          description: User trade positions (open and closed)
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/TradePosition"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /trade/positions/{id}/close:
    post:
      operationId: closeTradePosition
      tags: [trade]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Closed trade position
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TradePosition"
        "400":
          description: Error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  # Team
  /team/referral:
    get:
      operationId: getReferralInfo
      tags: [team]
      responses:
        "200":
          description: Referral info
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ReferralInfo"

  /team/members:
    get:
      operationId: listTeamMembers
      tags: [team]
      responses:
        "200":
          description: Team members
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/TeamMember"

  /team/earnings-overview:
    get:
      operationId: getTeamEarningsOverview
      tags: [team]
      parameters:
        - name: period
          in: query
          schema:
            type: string
            enum: [this_month, last_month, all_time]
      responses:
        "200":
          description: Team earnings
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TeamEarnings"

  # Profile
  /profile:
    get:
      operationId: getProfile
      tags: [profile]
      responses:
        "200":
          description: User profile
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Profile"
    patch:
      operationId: updateProfile
      tags: [profile]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ProfileUpdate"
      responses:
        "200":
          description: Updated profile
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Profile"

  /profile/change-password:
    post:
      operationId: changePassword
      tags: [profile]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ChangePasswordInput"
      responses:
        "200":
          description: Password changed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"
        "400":
          description: Error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /profile/2fa:
    get:
      operationId: get2FA
      tags: [profile]
      responses:
        "200":
          description: 2FA status
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TwoFAStatus"
    post:
      operationId: toggle2FA
      tags: [profile]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TwoFAToggleInput"
      responses:
        "200":
          description: 2FA toggled
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TwoFAStatus"

  /profile/kyc:
    get:
      operationId: getKYC
      tags: [profile]
      responses:
        "200":
          description: KYC status
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/KYCStatus"
    post:
      operationId: submitKYC
      tags: [profile]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/KYCInput"
      responses:
        "200":
          description: KYC submitted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/KYCStatus"

  /profile/kyc/session:
    post:
      operationId: createKycSession
      tags: [profile]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/KYCSessionInput"
      responses:
        "200":
          description: Didit verification session created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/KYCSession"

  /profile/notification-settings:
    get:
      operationId: getNotificationSettings
      tags: [profile]
      responses:
        "200":
          description: Notification settings
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/NotificationSettings"
    patch:
      operationId: updateNotificationSettings
      tags: [profile]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/NotificationSettingsUpdate"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/NotificationSettings"

  /profile/sessions:
    get:
      operationId: listSessions
      tags: [profile]
      responses:
        "200":
          description: Active sessions
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Session"

  /profile/sessions/{id}:
    delete:
      operationId: revokeSession
      tags: [profile]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Session revoked
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"

  # Notifications
  /notifications:
    get:
      operationId: listNotifications
      tags: [notifications]
      responses:
        "200":
          description: Notifications
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Notification"

  /notifications/{id}:
    delete:
      operationId: deleteNotification
      tags: [notifications]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"

  /notifications/{id}/read:
    post:
      operationId: markNotificationRead
      tags: [notifications]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Marked as read
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"

  /notifications/read-all:
    post:
      operationId: markAllNotificationsRead
      tags: [notifications]
      responses:
        "200":
          description: All marked as read
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"

  # Support
  /support/tickets:
    get:
      operationId: listSupportTickets
      tags: [support]
      responses:
        "200":
          description: Support tickets
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/SupportTicket"
    post:
      operationId: createSupportTicket
      tags: [support]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SupportTicketInput"
      responses:
        "201":
          description: Ticket created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SupportTicket"

  /support/faq:
    get:
      operationId: listFAQ
      tags: [support]
      responses:
        "200":
          description: FAQ items
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/FAQItem"

  /admin/overview:
    get:
      operationId: adminGetOverview
      tags: [admin]
      responses:
        "200":
          description: Admin dashboard overview
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminOverview"

  /admin/users:
    get:
      operationId: adminListUsers
      tags: [admin]
      parameters:
        - name: search
          in: query
          required: false
          schema:
            type: string
      responses:
        "200":
          description: Users
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/AdminUser"

  /admin/users/{id}:
    get:
      operationId: adminGetUser
      tags: [admin]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: User detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminUserDetail"

  /admin/users/{id}/status:
    post:
      operationId: adminSetUserStatus
      tags: [admin]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AdminUserStatusInput"
      responses:
        "200":
          description: Updated user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminUser"

  /admin/users/{id}/reset-password:
    post:
      operationId: adminResetUserPassword
      tags: [admin]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Temporary password
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminResetPasswordResult"

  /admin/users/{id}/adjust-balance:
    post:
      operationId: adminAdjustBalance
      tags: [admin]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AdminBalanceAdjustInput"
      responses:
        "200":
          description: Adjusted user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminUser"

  /admin/refund-by-uid:
    post:
      operationId: adminRefundByUid
      tags: [admin]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AdminRefundByUidInput"
      responses:
        "200":
          description: Updated user after refund
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminUser"

  /admin/kyc:
    get:
      operationId: adminListKyc
      tags: [admin]
      parameters:
        - name: status
          in: query
          required: false
          schema:
            type: string
      responses:
        "200":
          description: KYC submissions
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/AdminKycItem"

  /admin/kyc/{userId}/review:
    post:
      operationId: adminReviewKyc
      tags: [admin]
      parameters:
        - name: userId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AdminKycReviewInput"
      responses:
        "200":
          description: Reviewed KYC
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminKycItem"

  /admin/bots:
    get:
      operationId: adminListBots
      tags: [admin]
      responses:
        "200":
          description: Bots
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/AdminBot"
    post:
      operationId: adminCreateBot
      tags: [admin]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AdminBotInput"
      responses:
        "201":
          description: Created bot
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminBot"

  /admin/bots/{id}:
    patch:
      operationId: adminUpdateBot
      tags: [admin]
      parameters:
